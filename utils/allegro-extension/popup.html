<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 250px;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
        }

        h2 {
            margin: 0 0 16px 0;
            font-size: 16px;
            font-weight: 600;
            color: #1f2937;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        button {
            padding: 12px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        button:active {
            transform: translateY(0);
        }

        .batch-all {
            background-color: #f97316;
        }

        .batch-all:hover {
            background-color: #ea580c;
        }

        .status {
            margin-top: 12px;
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
            text-align: center;
            display: none;
        }

        .status.success {
            background-color: #dcfce7;
            color: #166534;
            display: block;
        }

        .status.error {
            background-color: #fee2e2;
            color: #991b1b;
            display: block;
        }

        .status.info {
            background-color: #dbeafe;
            color: #1e40af;
            display: block;
        }

        .shortcuts {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e5e7eb;
            font-size: 11px;
            color: #6b7280;
        }

        .shortcuts p {
            margin: 4px 0;
        }
    </style>
</head>

<body>
    <h2>Allegro Price Extractor</h2>

    <div class="button-group">
        <button id="batchAll" class="batch-all">
            Batch All Products
        </button>
    </div>

    <div id="status" class="status"></div>

    <div class="shortcuts">
        <p><strong>Shortcuts:</strong></p>
        <p>Shift + Hover: Extract price</p>
        <p>Shift + Alt + Hover: Extract & save</p>
        <p>Alt + Shift + U: Batch all</p>
    </div>

    <script src="popup.js"></script>
</body>

</html>
